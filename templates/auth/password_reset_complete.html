{% extends 'base.html' %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        min-height: 100vh;
    }
    .navbar {
        background: rgba(25, 135, 84, 0.9) !important;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 20px 0;
    }
    .auth-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 1.25rem;
        box-shadow: 0 8px 32px 0 rgba(11, 54, 29, 0.15);
        padding: 2.5rem;
        width: 100%;
        max-width: 440px;
        transition: transform 0.3s ease;
        text-align: center;
    }
    .auth-brand i {
        font-size: 4rem;
        color: #198754;
        margin-bottom: 1.5rem;
        filter: drop-shadow(0 2px 8px rgba(25, 135, 84, 0.3));
    }
    .auth-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1b4332;
        margin-bottom: 1rem;
    }
    .auth-subtitle {
        color: #556b2f;
        font-size: 0.95rem;
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    
    .btn-auth {
        background: linear-gradient(135deg, #40916c 0%, #1b4332 100%);
        border: none;
        border-radius: 0.75rem;
        padding: 0.8rem;
        font-weight: 600;
        color: #fff;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(40, 145, 108, 0.3);
        display: inline-block;
        width: 100%;
        text-decoration: none;
    }
    .btn-auth:hover {
        background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(40, 145, 108, 0.4);
        color: #fff;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand">
            <i class="fas fa-check-circle text-success"></i>
        </div>
        <h2 class="auth-title">Reset Berhasil</h2>
        <p class="auth-subtitle">
            Password Anda telah berhasil diperbarui. Silakan login kembali dengan password baru Anda.
        </p>
        
        <a href="{% url 'login' %}" class="btn btn-auth">Masuk ke Akun</a>
    </div>
</div>
{% endblock %}
