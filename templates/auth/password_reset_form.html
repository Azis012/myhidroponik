{% extends 'base.html' %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        min-height: 100vh;
    }
    .navbar {
        background: rgba(25, 135, 84, 0.9) !important;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 20px 0;
    }
    .auth-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 1.25rem;
        box-shadow: 0 8px 32px 0 rgba(11, 54, 29, 0.15);
        padding: 2.5rem;
        width: 100%;
        max-width: 440px;
        transition: transform 0.3s ease;
    }
    .auth-brand {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-brand i {
        font-size: 3rem;
        color: #198754;
        margin-bottom: 0.5rem;
        filter: drop-shadow(0 2px 8px rgba(25, 135, 84, 0.3));
    }
    .auth-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1b4332;
        margin-bottom: 0.5rem;
    }
    .auth-subtitle {
        color: #52b788;
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
    }
    
    /* Django form customization */
    .auth-card form p {
        margin-bottom: 1.25rem;
        display: flex;
        flex-direction: column;
    }
    .auth-card form p label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #2d6a4f;
        margin-bottom: 0.5rem;
        display: inline-block;
    }
    .auth-card form p input {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        font-weight: 400;
        line-height: 1.5;
        color: #1b4332;
        background-color: #ffffff;
        border: 2px solid #d8f3dc;
        border-radius: 0.75rem;
        transition: all 0.2s ease-in-out;
    }
    .auth-card form p input:focus {
        border-color: #52b788;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(82, 183, 136, 0.25);
        background-color: #fff;
    }
    
    .btn-auth {
        background: linear-gradient(135deg, #40916c 0%, #1b4332 100%);
        border: none;
        border-radius: 0.75rem;
        padding: 0.8rem;
        font-weight: 600;
        color: #fff;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(40, 145, 108, 0.3);
    }
    .btn-auth:hover {
        background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(40, 145, 108, 0.4);
        color: #fff;
    }
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
    }
    .auth-footer a {
        color: #40916c;
        text-decoration: none;
        font-weight: 600;
    }
    .auth-footer a:hover {
        color: #1b4332;
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand">
            <i class="fas fa-key"></i>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle">Masukkan email Anda untuk menerima link reset</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1.25rem; display: flex; flex-direction: column;">
                <label for="email" style="font-size: 0.9rem; font-weight: 600; color: #2d6a4f; margin-bottom: 0.5rem;">Alamat Email</label>
                <input type="email" name="email" id="email" required placeholder="nama@email.com" style="display: block; width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; font-weight: 400; line-height: 1.5; color: #1b4332; background-color: #ffffff; border: 2px solid #d8f3dc; border-radius: 0.75rem;">
            </div>
            <button type="submit" class="btn btn-auth w-100">Kirim Kode OTP</button>
        </form>
        
        <div class="auth-footer text-muted">
            <a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
        </div>
    </div>
</div>
{% endblock %}
